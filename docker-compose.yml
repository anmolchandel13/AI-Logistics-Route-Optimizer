version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: logistics-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: logistics_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - logistics-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: logistics-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      GEMINI_API_KEY: ${GEMINI_API_KEY:-mock}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - logistics-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: logistics-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - logistics-network

volumes:
  mysql_data:

networks:
  logistics-network:
    driver: bridge
