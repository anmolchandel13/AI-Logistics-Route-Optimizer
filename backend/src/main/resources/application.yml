spring:
  application:
    name: logistics-optimizer

  # Default: H2 in-memory database (just run mvn spring-boot:run)
  datasource:
    url: jdbc:h2:mem:logisticsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# JWT Configuration
jwt:
  secret: K8sLogisticsOptimizerSuperSecretJWTSigningKey2024ForProductionUseChangeThis!!
  expiration: 86400000

# Gemini AI Configuration
gemini:
  api:
    key: ${GEMINI_API_KEY:mock}
    model: gemini-2.0-flash
    url: https://generativelanguage.googleapis.com/v1beta/models

# Server Configuration
server:
  port: 8080

# Swagger / OpenAPI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /api-docs

# Logging
logging:
  level:
    com.logistics.optimizer: INFO
    org.springframework.security: WARN

---
# Docker / MySQL Profile
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:mysql://mysql:3306/logistics_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root123

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  h2:
    console:
      enabled: false
